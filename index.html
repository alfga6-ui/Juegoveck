<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VECK.IO — PRO FPS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
:root{
  --c:#00f5ff;--c2:#ff0066;--c3:#aaff00;--c4:#ff8800;
  --bg:#020608;--panel:rgba(2,10,14,0.96);--border:rgba(0,245,255,0.28);
  --txt:#c8e8f0;--safe:env(safe-area-inset-bottom,0px)
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;background:var(--bg);font-family:'Rajdhani',sans-serif;color:var(--txt)}

/* ── LOADING ── */
#LOAD{position:fixed;inset:0;background:var(--bg);z-index:900;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.4em}
.load-logo{font-family:'Orbitron',sans-serif;font-size:clamp(2.5rem,9vw,5.5rem);font-weight:900;color:#fff;letter-spacing:.15em;text-shadow:0 0 25px var(--c),0 0 70px rgba(0,245,255,.35)}
.load-logo em{color:var(--c2);font-style:normal}
.load-wrap{width:260px;height:3px;background:rgba(0,245,255,.1);border-radius:2px;overflow:hidden}
.load-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--c),var(--c3));box-shadow:0 0 8px var(--c);transition:width .35s ease}
.load-msg{font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:.18em;color:var(--c);opacity:.6}
#LOAD.fade{opacity:0;transition:opacity .5s;pointer-events:none}

/* ── LOBBY ── */
#LOBBY{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;overflow:hidden}
.lobby-bg{position:absolute;inset:0;overflow:hidden}
.lobby-bg::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,245,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.03) 1px,transparent 1px);background-size:55px 55px;animation:gMove 18s linear infinite}
.lobby-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 40%,rgba(0,245,255,.06) 0%,transparent 55%),radial-gradient(ellipse at 80% 60%,rgba(255,0,102,.06) 0%,transparent 55%)}
@keyframes gMove{to{background-position:0 55px}}
.game-logo{font-family:'Orbitron',sans-serif;font-size:clamp(2.8rem,8vw,5.5rem);font-weight:900;color:#fff;letter-spacing:.15em;text-shadow:0 0 18px var(--c),0 0 50px rgba(0,245,255,.35);position:relative;z-index:1;animation:logoF 5s infinite}
.game-logo em{color:var(--c2);text-shadow:0 0 18px var(--c2);font-style:normal}
@keyframes logoF{0%,92%,100%{opacity:1}94%{opacity:.75}97%{opacity:.5}99%{opacity:1}}
.tagline{font-family:'Share Tech Mono',monospace;font-size:clamp(.6rem,1.8vw,.85rem);letter-spacing:.3em;color:var(--c);opacity:.65;margin-bottom:2.2em;text-transform:uppercase;position:relative;z-index:1}
.card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:2em 2.4em;width:min(490px,93vw);position:relative;z-index:1;box-shadow:0 0 50px rgba(0,245,255,.07),inset 0 1px 0 rgba(255,255,255,.04)}
.card::before{content:'';position:absolute;top:-1px;left:15px;right:15px;height:2px;background:linear-gradient(90deg,transparent,var(--c),transparent)}
.flbl{font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:.18em;color:var(--c);opacity:.65;display:block;margin-bottom:.38em;text-transform:uppercase}
input[type=text]{width:100%;background:rgba(0,245,255,.04);border:1px solid var(--border);border-radius:4px;padding:.7em .9em;color:#fff;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;appearance:none}
input[type=text]:focus{border-color:var(--c);box-shadow:0 0 14px rgba(0,245,255,.12)}
.fg{margin-bottom:1.2em}
.bg2{display:grid;grid-template-columns:1fr 1fr;gap:.45em;margin-bottom:1.2em}
.mbtn{background:rgba(0,245,255,.04);border:1px solid rgba(0,245,255,.2);border-radius:4px;padding:.6em .4em;color:var(--txt);font-family:'Rajdhani',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .18s;text-align:center}
.mbtn:active,.mbtn.on{background:rgba(0,245,255,.13);border-color:var(--c);color:var(--c)}
.play-btn{width:100%;background:linear-gradient(135deg,rgba(0,245,255,.14),rgba(0,245,255,.04));border:1px solid var(--c);border-radius:4px;padding:.88em;color:var(--c);font-family:'Orbitron',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:.18em;cursor:pointer;transition:all .2s;text-transform:uppercase;position:relative;overflow:hidden}
.play-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);transform:translateX(-100%);transition:transform .4s}
.play-btn:hover::after{transform:translateX(100%)}
.play-btn:hover{background:rgba(0,245,255,.18);box-shadow:0 0 22px rgba(0,245,255,.22)}
.play-btn:active{transform:scale(.98)}
.slbl{margin-top:.9em;text-align:center;font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--c3);opacity:.6;letter-spacing:.1em}

/* ── ROOM CODE ── */
#ROOM-BADGE{position:fixed;top:0;left:50%;transform:translateX(-50%);background:rgba(0,8,14,.97);border:1px solid var(--c);border-top:none;border-radius:0 0 10px 10px;padding:.35em 1.2em;z-index:999;display:none;align-items:center;gap:.9em;box-shadow:0 4px 24px rgba(0,245,255,.18)}
#ROOM-BADGE.show{display:flex}
.rb-label{font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:.12em;color:var(--c);opacity:.55}
#rb-code{font-family:'Orbitron',sans-serif;font-size:1.35rem;font-weight:900;color:var(--c);letter-spacing:.22em;text-shadow:0 0 12px var(--c)}
.rb-copy{background:none;border:1px solid rgba(0,245,255,.28);border-radius:4px;padding:.22em .55em;color:var(--c);font-family:'Share Tech Mono',monospace;font-size:.58rem;cursor:pointer;letter-spacing:.08em;transition:all .15s}
.rb-copy:active{background:rgba(0,245,255,.14)}

/* ── CANVAS ── */
#CV{position:fixed;inset:0;width:100%;height:100%;display:none}
#CV.show{display:block}

/* ── HUD ── */
#HUD{position:fixed;inset:0;pointer-events:none;z-index:10;display:none}
#HUD.show{display:block}

/* Crosshair */
.xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.xhair svg{filter:drop-shadow(0 0 2px rgba(255,255,255,.6))}

/* Top bar */
.hud-top{position:absolute;top:max(42px,calc(42px + var(--safe)));left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:0 18px;gap:.4em}
.htag{background:rgba(2,8,14,.82);border:1px solid rgba(0,245,255,.18);border-radius:4px;padding:.3em .7em;backdrop-filter:blur(4px)}
.htag-kills{font-family:'Orbitron',sans-serif;font-size:.78rem;font-weight:700;color:var(--c3)}
.htag-mode{font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:.06em;color:var(--c2)}
.htag-ping{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--c3);opacity:.55;padding:.3em .65em}

/* Kill feed */
.kfeed{position:absolute;top:max(90px,calc(90px + var(--safe)));right:18px;display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.kentry{background:rgba(2,8,14,.88);border-left:2px solid var(--c2);padding:.18em .5em;font-family:'Rajdhani',sans-serif;font-size:.73rem;font-weight:600;animation:kfade 3.5s forwards;white-space:nowrap;backdrop-filter:blur(3px)}
.kentry .kn{color:var(--c3)}.kentry .kv{color:var(--c2)}.kentry .kw{color:var(--c);font-size:.65em;opacity:.7}
@keyframes kfade{0%,72%{opacity:1}100%{opacity:0;transform:translateX(8px)}}

/* Leaderboard */
.hud-lb{position:absolute;top:max(90px,calc(90px + var(--safe)));left:18px;background:rgba(2,8,14,.82);border:1px solid rgba(0,245,255,.14);border-radius:4px;padding:.4em .65em;min-width:145px;backdrop-filter:blur(4px)}
.lb-ttl{font-family:'Share Tech Mono',monospace;font-size:.52rem;letter-spacing:.18em;color:var(--c);opacity:.55;border-bottom:1px solid rgba(0,245,255,.09);padding-bottom:.28em;margin-bottom:.3em}
.lb-row{display:flex;justify-content:space-between;align-items:center;padding:.15em 0;font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:600;border-bottom:1px solid rgba(255,255,255,.025)}
.lb-row.me{color:var(--c3)}.lb-row .lk{color:var(--c2);font-family:'Orbitron',sans-serif;font-size:.65rem}

/* Bottom HUD */
.hud-bot{position:absolute;bottom:max(calc(160px + var(--safe)),180px);left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;padding:0 18px}
.hstat{background:rgba(2,8,14,.88);border:1px solid rgba(0,245,255,.18);border-radius:5px;padding:.4em .85em;min-width:95px;backdrop-filter:blur(4px)}
.hstat-lbl{font-family:'Share Tech Mono',monospace;font-size:.48rem;letter-spacing:.18em;opacity:.48;text-transform:uppercase;display:block;margin-bottom:.08em;color:var(--c)}
.hstat-val{font-family:'Orbitron',sans-serif;font-size:1.35rem;font-weight:700;color:#fff;line-height:1}
.hstat-val.low{color:var(--c2);animation:blink .45s step-end infinite}
@keyframes blink{50%{opacity:.35}}
.hp-wrap{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:.22em;overflow:hidden}
.hp-fill{height:100%;background:linear-gradient(90deg,var(--c2),var(--c));border-radius:2px;transition:width .25s}
.wp-disp{display:flex;flex-direction:column;align-items:flex-end}
.wp-lbl{font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:.12em;opacity:.45;margin-bottom:.15em;color:var(--c)}
.score-ctr{text-align:center;opacity:.4}
.score-lbl{font-family:'Share Tech Mono',monospace;font-size:.5rem;letter-spacing:.12em;color:var(--c)}
.score-val{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700}

/* Notify */
.hud-notify{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-size:clamp(.9rem,3.5vw,1.35rem);font-weight:900;letter-spacing:.2em;color:var(--c3);text-shadow:0 0 18px var(--c3);opacity:0;pointer-events:none;text-align:center;text-transform:uppercase;white-space:nowrap}
.hud-notify.pop{animation:notPop 2s forwards}
@keyframes notPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.65)}18%{opacity:1;transform:translate(-50%,-50%) scale(1.06)}35%{transform:translate(-50%,-50%) scale(1)}72%{opacity:1}100%{opacity:0}}

/* Dmg flash */
#DMGF{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 28%,rgba(255,0,0,.6) 100%);pointer-events:none;opacity:0;z-index:50;transition:opacity .04s}
#DMGF.on{opacity:1}
/* Hit marker */
#HITM{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:14px;height:14px;pointer-events:none;opacity:0;z-index:12}
#HITM.on{opacity:1;transition:opacity .04s}
#HITM::before,#HITM::after{content:'';position:absolute;background:var(--c2)}
#HITM::before{width:100%;height:2px;top:50%;left:0;transform:translateY(-50%)}
#HITM::after{height:100%;width:2px;left:50%;top:0;transform:translateX(-50%)}

/* Weapon wheel */
.wpwheel{position:absolute;bottom:max(calc(170px + var(--safe)),190px);right:18px;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.wpslot{background:rgba(2,8,14,.75);border:1px solid rgba(0,245,255,.1);border-radius:3px;padding:.2em .5em;font-family:'Rajdhani',sans-serif;font-size:.68rem;font-weight:600;color:var(--txt);opacity:.48;transition:all .15s}
.wpslot.cur{border-color:var(--c);color:var(--c);opacity:1;box-shadow:0 0 7px rgba(0,245,255,.13)}

/* Minimap */
#MMAP{position:absolute;bottom:max(calc(170px + var(--safe)),190px);left:18px;width:105px;height:105px;border:1px solid rgba(0,245,255,.22);border-radius:50%;overflow:hidden;background:rgba(0,8,15,.55);backdrop-filter:blur(2px)}
#MMAP canvas{width:100%;height:100%}

/* ── DEATH ── */
#DEATH{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:60;align-items:center;justify-content:center;flex-direction:column;gap:.7em}
#DEATH.show{display:flex}
.d-ttl{font-family:'Orbitron',sans-serif;font-size:clamp(1.8rem,6vw,2.8rem);font-weight:900;color:var(--c2);text-shadow:0 0 28px var(--c2);letter-spacing:.2em}
.d-sub{font-family:'Share Tech Mono',monospace;font-size:.95rem;color:var(--c);opacity:.78;letter-spacing:.18em}

/* ── PAUSE ── */
#PAUSE{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:150;align-items:center;justify-content:center;flex-direction:column;gap:.8em}
#PAUSE.show{display:flex}
.p-ttl{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;color:var(--c);letter-spacing:.2em;margin-bottom:.8em}
.p-btn{width:210px;background:rgba(0,245,255,.06);border:1px solid var(--c);border-radius:5px;padding:.82em;color:var(--c);font-family:'Orbitron',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.14em;cursor:pointer;transition:all .18s}
.p-btn:hover{background:rgba(0,245,255,.16)}
.p-btn.danger{border-color:var(--c2);color:var(--c2);background:rgba(255,0,102,.06)}
.p-btn.danger:hover{background:rgba(255,0,102,.16)}

/* ── TOUCH CONTROLS ── */
#TOUCH{position:fixed;inset:0;pointer-events:none;z-index:20;display:none}
#TOUCH.show{display:block}

/* Joystick */
.joy-area{position:absolute;bottom:max(calc(18px + var(--safe)),28px);left:16px;width:140px;height:140px;pointer-events:all}
.joy-ring{position:absolute;inset:0;border-radius:50%;background:rgba(0,245,255,.06);border:2px solid rgba(0,245,255,.2)}
.joy-knob{width:52px;height:52px;border-radius:50%;background:rgba(0,245,255,.18);border:2px solid rgba(0,245,255,.7);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 14px rgba(0,245,255,.28);pointer-events:none}

/* Look area */
.look-area{position:absolute;right:0;bottom:0;top:0;left:42%;pointer-events:all}

/* Action buttons - RIGHT SIDE CLUSTER */
/* FIRE - big, bottom right */
.tbtn{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:700;pointer-events:all;background:rgba(0,0,0,.55);border:2px solid rgba(255,255,255,.22);color:rgba(255,255,255,.82);user-select:none;touch-action:none;transition:background .08s,border-color .08s,box-shadow .08s}
.tbtn.on,.tbtn:active{box-shadow:0 0 14px rgba(0,245,255,.35)}
/* Fire */
#tb-fire{
  width:86px;height:86px;
  right:18px;
  bottom:max(calc(22px + var(--safe)),32px);
  border-color:rgba(255,0,102,.65);
  font-size:.62rem;letter-spacing:.06em;
  background:rgba(80,0,30,.55)
}
#tb-fire.on{background:rgba(180,0,60,.45);border-color:var(--c2);box-shadow:0 0 18px rgba(255,0,102,.4)}
/* Jump */
#tb-jump{
  width:60px;height:60px;
  right:118px;
  bottom:max(calc(38px + var(--safe)),48px);
  font-size:.55rem;letter-spacing:.04em
}
#tb-jump.on{background:rgba(0,245,255,.22);border-color:var(--c)}
/* Reload */
#tb-reload{
  width:54px;height:54px;
  right:190px;
  bottom:max(calc(42px + var(--safe)),52px);
  font-size:.5rem;letter-spacing:.04em;
  border-color:rgba(255,136,0,.5)
}
#tb-reload.on{background:rgba(255,136,0,.22);border-color:var(--c4)}
/* Slide / Crouch */
#tb-slide{
  width:50px;height:50px;
  right:18px;
  bottom:max(calc(122px + var(--safe)),138px);
  border-color:rgba(170,255,0,.4);
  font-size:.48rem
}
#tb-slide.on{background:rgba(170,255,0,.18);border-color:var(--c3)}
/* Weapon swap */
#tb-swap{
  width:46px;height:46px;
  right:78px;
  bottom:max(calc(130px + var(--safe)),148px);
  font-size:.45rem
}
#tb-swap.on{background:rgba(0,245,255,.18);border-color:var(--c)}
/* Aim (ADS) */
#tb-aim{
  width:46px;height:46px;
  right:18px;
  bottom:max(calc(182px + var(--safe)),200px);
  font-size:.44rem;
  border-color:rgba(0,245,255,.35)
}
#tb-aim.on{background:rgba(0,245,255,.18);border-color:var(--c)}

/* ── POINTER LOCK ── */
#PLO{display:none;position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:.8em;background:rgba(0,0,0,.65);cursor:pointer}
#PLO.show{display:flex}
.plo-msg{font-family:'Orbitron',sans-serif;font-size:1.1rem;color:var(--c);letter-spacing:.18em;text-align:center;animation:breathe 2s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.65}50%{opacity:1}}

/* Blood splatter overlay */
#BLOOD{position:fixed;inset:0;pointer-events:none;z-index:55;opacity:0;background:radial-gradient(ellipse at 30% 20%,rgba(180,0,0,.35) 0%,transparent 40%),radial-gradient(ellipse at 70% 60%,rgba(160,0,0,.25) 0%,transparent 35%);transition:opacity .08s}
#BLOOD.on{opacity:1}
</style>
</head>
<body>

<!-- LOADING -->
<div id="LOAD">
  <div class="load-logo">VECK<em>.</em>IO</div>
  <div class="load-wrap"><div class="load-fill" id="LF"></div></div>
  <div class="load-msg" id="LM">INICIANDO MOTOR...</div>
</div>

<!-- ROOM BADGE -->
<div id="ROOM-BADGE">
  <div><div class="rb-label">CÓDIGO DE SALA</div><div id="rb-code">------</div></div>
  <button class="rb-copy" id="rb-copy">COPIAR</button>
</div>

<!-- LOBBY -->
<div id="LOBBY">
  <div class="lobby-bg"></div>
  <div class="game-logo">VECK<em>.</em>IO</div>
  <div class="tagline">BROWSER FPS · MULTIJUGADOR P2P</div>
  <div class="card">
    <div class="fg">
      <label class="flbl">TU NOMBRE</label>
      <input type="text" id="ni" placeholder="Ingresa tu nombre..." maxlength="16" autocomplete="off">
    </div>
    <div class="fg">
      <label class="flbl">MODO DE JUEGO</label>
      <div class="bg2">
        <button class="mbtn on" data-mode="arcade">⚡ ARCADE</button>
        <button class="mbtn" data-mode="team">🛡 TEAM 4v4</button>
        <button class="mbtn" data-mode="gungame">🔫 GUN GAME</button>
        <button class="mbtn" data-mode="ffa">💀 FREE FOR ALL</button>
      </div>
    </div>
    <div class="fg">
      <label class="flbl">CÓDIGO DE SALA (vacío = crear sala)</label>
      <input type="text" id="ri" placeholder="Código para unirse, o vacío para crear..." maxlength="8" autocomplete="off" style="text-transform:uppercase">
    </div>
    <button class="play-btn" id="PB">⚡ CONECTAR Y JUGAR</button>
    <div class="slbl" id="SL">LISTO · MODO P2P</div>
  </div>
</div>

<!-- CANVAS -->
<canvas id="CV"></canvas>

<!-- HUD -->
<div id="HUD">
  <div class="hud-top">
    <div class="htag htag-kills" id="HK">☠ 0 KILLS</div>
    <div class="htag htag-mode" id="HMD">ARCADE</div>
    <div class="htag-ping" id="HPG">◦ -- MS</div>
  </div>
  <div class="kfeed" id="KF"></div>
  <div class="hud-lb"><div class="lb-ttl">JUGADORES</div><div id="LBL"></div></div>

  <!-- Crosshair SVG -->
  <div class="xhair">
    <svg width="24" height="24" viewBox="0 0 24 24">
      <line x1="12" y1="2" x2="12" y2="9" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="12" y1="15" x2="12" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="2" y1="12" x2="9" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="15" y1="12" x2="22" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <circle cx="12" cy="12" r="1.5" fill="rgba(255,0,102,0.9)"/>
    </svg>
  </div>

  <div id="HITM"></div>
  <div class="hud-notify" id="HN"></div>

  <div class="hud-bot">
    <div class="hstat">
      <span class="hstat-lbl">SALUD</span>
      <span class="hstat-val" id="HV">100</span>
      <div class="hp-wrap"><div class="hp-fill" id="HPF" style="width:100%"></div></div>
    </div>
    <div class="score-ctr">
      <div class="score-lbl">SCORE</div>
      <div class="score-val" id="HSC">0</div>
    </div>
    <div class="wp-disp">
      <div class="wp-lbl" id="WN">ASSAULT RIFLE</div>
      <div class="hstat">

// ═══════════════════════════════════════════════════════
// LOADING
// ═══════════════════════════════════════════════════════
async function init() {
  const fill = document.getElementById('LF');
  const msg  = document.getElementById('LM');
  const steps = [[20,'CARGANDO THREE.JS...'],[50,'CONSTRUYENDO MUNDO...'],[78,'INICIANDO FÍSICA...'],[95,'CONECTANDO SERVIDORES...'],[100,'¡LISTO!']];
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js');
  for (const [p,m] of steps) { fill.style.width=p+'%'; msg.textContent=m; await wait(260); }
  await wait(180);
  document.getElementById('LOAD').classList.add('fade');
  await wait(520);
  document.getElementById('LOAD').style.display='none';
  document.getElementById('LOBBY').style.display='flex';
  setupLobby();
}

function loadScript(src) {
  return new Promise(r=>{ const s=document.createElement('script'); s.src=src; s.onload=r; document.head.appendChild(s); });
}
function wait(ms) { return new Promise(r=>setTimeout(r,ms)); }

function setupLobby() {
  document.querySelectorAll('[data-mode]').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('[data-mode]').forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); gameMode=b.dataset.mode;
    });
  });
  const saved = localStorage.getItem('veckio-name');
  if (saved) document.getElementById('ni').value = saved;
  document.getElementById('ni').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('PB').click(); });
}

// ═══════════════════════════════════════════════════════
// START GAME
// ═══════════════════════════════════════════════════════
async function startGame() {
  localName = document.getElementById('ni').value.trim() || 'VECK'+Math.floor(Math.random()*9999);
  localStorage.setItem('veckio-name', localName);
  S.name = localName;
  S.color = PCOLS[Math.floor(Math.random()*PCOLS.length)];
  localId = 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);

  const roomInput = document.getElementById('ri').value.trim().toUpperCase();
  isHost = !roomInput;

  initScene();
  buildWorld();
  doSpawn();

  if (isHost) {
    const code = genCode();
    window._code = code;
    peer = new Peer('VECKPRO-'+code, {debug:0});
    peer.on('open', ()=>{ showRoom(code); doFinishStart(); });
    peer.on('connection', conn=>{
      clientConns[conn.peer]=conn;
      conn.on('data', data=>onData(data, conn.peer));
      conn.on('close', ()=>{
        if(pMeshes[conn.peer]){ scene.remove(pMeshes[conn.peer]); delete pMeshes[conn.peer]; }
        delete players[conn.peer];
        bcast({type:'leave',id:conn.peer});
      });
    });
    peer.on('error', e=>{ setSL('ERROR: '+e.type); });
  } else {
    window._code = roomInput;
    peer = new Peer({debug:0});
    peer.on('open', ()=>{
      hostConn = peer.connect('VECKPRO-'+roomInput, {reliable:true});
      hostConn.on('open', ()=>{ showRoom(roomInput); doFinishStart(); });
      hostConn.on('data', data=>onData(data, null));
      hostConn.on('close', ()=>{ alert('Host desconectado'); location.reload(); });
      hostConn.on('error', ()=>{ alert('Código inválido o sala no existe'); location.reload(); });
    });
    peer.on('error', ()=>{ alert('Error de red'); location.reload(); });
  }
}

function genCode() {
  return Math.random().toString(36).slice(2,7).toUpperCase();
}

function showRoom(code) {
  document.getElementById('rb-code').textContent = code;
  document.getElementById('ROOM-BADGE').classList.add('show');
  document.getElementById('rb-copy').onclick = ()=>{
    navigator.clipboard.writeText(code).catch(()=>{});
    const btn = document.getElementById('rb-copy');

    setTimeout(()=>btn.textContent='COPIAR', 2200);

function setSL(t) { document.getElementById('SL').textContent=t; }

function doSpawn() {

function doFinishStart() {

// ═══════════════════════════════════════════════════════
// NETWORK
// ═══════════════════════════════════════════════════════
function netSend(data) {
  if (isHost) { bcast(data); onData(data, localId); }
  else if (hostConn && hostConn.open) hostConn.send(data);
}

function bcast(data, skip) {
  for (const pid in clientConns)
    if (pid!==skip && clientConns[pid].open) clientConns[pid].send(data);
}

function onData(data, from) {
  if (isHost && from && from!==localId) bcast(data, from);

  if (data.type==='join'||data.type==='sync') {
    const id=data.id; if(id===localId) return;
    const ps=data.s;
    if (!players[id]) { players[id]=ps; makePMesh(id,ps); }
    else { players[id]=ps; movePMesh(id,ps); }
  } else if (data.type==='leave') {
    if(pMeshes[data.id]){scene.remove(pMeshes[data.id]);delete pMeshes[data.id];}
    delete players[data.id];
  } else if (data.type==='bullet') {
    if (data.b.owner!==localId) spawnNetBullet(data.bid, data.b);
  } else if (data.type==='hit') {
    if (data.h.victim===localId && S.alive) takeDmg(data.h.dmg, data.h.sName, data.h.wp, data.h.pos);
  } else if (data.type==='impact') {
    // Show bullet impact decal at given world position
    spawnDecal(data.px, data.py, data.pz, data.nx, data.ny, data.nz);
  }
}

// ═══════════════════════════════════════════════════════
// SCENE
// ═══════════════════════════════════════════════════════
function initScene() {
  THREE = window.THREE;
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x060e18, 0.009); // lighter fog = more visibility
  scene.background = new THREE.Color(0x050c16);

  cam = new THREE.PerspectiveCamera(82, innerWidth/innerHeight, 0.04, 600);

  renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById('CV'),
    antialias: false,
    powerPreference: 'high-performance'
  });
  renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1.3 : 1.9));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = false;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.4; // brighter

  // SKY
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(500, 16, 8),
    new THREE.ShaderMaterial({
      side: THREE.BackSide,
      vertexShader:`varying vec3 vP;void main(){vP=normalize(position);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`varying vec3 vP;void main(){
        float h=(vP.y+1.)*.5;
        vec3 bot=vec3(.04,.11,.22);
        vec3 top=vec3(.01,.04,.1);
        vec3 col=mix(bot,top,h);
        // Stars
        float star=step(.998,fract(sin(dot(floor(vP*120.),vec3(12.9898,78.233,45.164)))*43758.5));
        col+=star*.7*max(0.,vP.y);
        gl_FragColor=vec4(col,1.);
      }`
    })
  ));

  // LIGHTS — much brighter for visibility
  scene.add(new THREE.AmbientLight(0x3a5060, 3.0));  // strong ambient

  const sun = new THREE.DirectionalLight(0xffd0a0, 4.0);
  sun.position.set(40, 80, 30); scene.add(sun);

  const fill = new THREE.DirectionalLight(0x4080ff, 2.5);
  fill.position.set(-30, 40, -20); scene.add(fill);

  // Neon area lights
  const nl1 = new THREE.PointLight(0x00f5ff, 5, 50); nl1.position.set(0, 10, 0); scene.add(nl1);
  const nl2 = new THREE.PointLight(0xff0066, 4, 45); nl2.position.set(28, 7, 22); scene.add(nl2);
  const nl3 = new THREE.PointLight(0xaaff00, 3.5, 45); nl3.position.set(-28, 7, -22); scene.add(nl3);
  const nl4 = new THREE.PointLight(0xff8800, 3, 40); nl4.position.set(28, 7, -22); scene.add(nl4);
  const nl5 = new THREE.PointLight(0x8800ff, 3, 40); nl5.position.set(-28, 7, 22); scene.add(nl5);

  // Ground — grid + concrete look
  const gCv = document.createElement('canvas'); gCv.width=gCv.height=512;
  const gx = gCv.getContext('2d');
  // Concrete base
  const grad = gx.createLinearGradient(0,0,512,512);
  grad.addColorStop(0,'#0d1e2e'); grad.addColorStop(1,'#0a1620');
  gx.fillStyle=grad; gx.fillRect(0,0,512,512);
  // Grid lines
  gx.strokeStyle='rgba(0,245,255,0.18)'; gx.lineWidth=1;
  for(let i=0;i<=512;i+=32){
    gx.beginPath();gx.moveTo(i,0);gx.lineTo(i,512);gx.stroke();
    gx.beginPath();gx.moveTo(0,i);gx.lineTo(512,i);gx.stroke();
  }
  // Noise specks
  for(let i=0;i<4000;i++){
    const x=Math.random()*512,y=Math.random()*512,r=Math.random()*.8+.2;
    gx.fillStyle=`rgba(255,255,255,${Math.random()*.04})`;
    gx.fillRect(x,y,r,r);
  }
  const gt = new THREE.CanvasTexture(gCv);
  gt.wrapS=gt.wrapT=THREE.RepeatWrapping; gt.repeat.set(MAP_SZ/2.5, MAP_SZ/2.5);

  const gnd = new THREE.Mesh(
    new THREE.PlaneGeometry(MAP_SZ*2.5, MAP_SZ*2.5, 1, 1),
    new THREE.MeshStandardMaterial({color:0x152030, roughness:.22, metalness:.75, map:gt})
  );
  gnd.rotation.x = -Math.PI/2; scene.add(gnd);

  clock = new THREE.Clock();
  makeGun();

  window.addEventListener('resize',()=>{
    cam.aspect = innerWidth/innerHeight;
    cam.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

// ═══════════════════════════════════════════════════════
// WORLD BUILDING
// ═══════════════════════════════════════════════════════
function buildWorld() {
  // Procedural building textures
  const makeBuildTex = (col, lineCol) => {
    const c=document.createElement('canvas'); c.width=c.height=256;
    const x=c.getContext('2d');
    x.fillStyle=col; x.fillRect(0,0,256,256);
    x.strokeStyle=lineCol; x.lineWidth=.8;
    // horizontal window bands
    for(let y=20;y<256;y+=28){
      x.globalAlpha=.25; x.beginPath();x.moveTo(0,y);x.lineTo(256,y);x.stroke();
    }
    // vertical lines
    for(let xi=30;xi<256;xi+=30){
      x.globalAlpha=.12; x.beginPath();x.moveTo(xi,0);x.lineTo(xi,256);x.stroke();
    }
    x.globalAlpha=1;
    // window pattern
    x.fillStyle='rgba(100,200,255,0.08)';
    for(let yw=24;yw<256;yw+=28){
      for(let xw=8;xw<256;xw+=30){
        if(Math.random()>.35) x.fillRect(xw,yw-4,18,10);
      }
    }
    return new THREE.CanvasTexture(c);
  };

  const MATS = {
    b: new THREE.MeshStandardMaterial({color:0x152030, roughness:.28, metalness:.75, map:makeBuildTex('#152030','rgba(0,245,255,0.4)')}),
    w: new THREE.MeshStandardMaterial({color:0x0d1e2e, roughness:.65, metalness:.3}),
    o: new THREE.MeshStandardMaterial({color:0x1a2a18, roughness:.72, metalness:.25}),
    c: new THREE.MeshStandardMaterial({color:0x1c1c28, roughness:.8, metalness:.2}),
  };

  MAP.forEach(([cx,cz,w,d,h,t])=>{
    const mat = MATS[t]||MATS.b;
    const geo = new THREE.BoxGeometry(w, h, d);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(cx, h/2, cz); scene.add(mesh);

    // Edges
    const emat = new THREE.LineBasicMaterial({
      color: t==='b'?0x00f5ff:t==='o'?0xaaff00:t==='c'?0x4466aa:0x334455,
      transparent:true, opacity:.38
    });
    mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), emat));

    // Emissive top strip on buildings
    if (t==='b') {
      const strip = new THREE.Mesh(
        new THREE.BoxGeometry(w,.1,d),
        new THREE.MeshBasicMaterial({color:0x00f5ff,transparent:true,opacity:.55})
      );
      strip.position.set(cx,h+.05,cz); scene.add(strip);

      // Roof point light
      const rpl = new THREE.PointLight(0x00f5ff,2.5,20);
      rpl.position.set(cx,h+.5,cz); scene.add(rpl);
    }

    colliders.push({minX:cx-w/2,maxX:cx+w/2,minY:0,maxY:h,minZ:cz-d/2,maxZ:cz+d/2});
  });

  // Invisible boundary
  const B=MAP_SZ;
  [[0,B,B*2.1,2],[0,-B,B*2.1,2],[B,0,2,B*2.1],[-B,0,2,B*2.1]].forEach(([x,z,w,d])=>{
    colliders.push({minX:x-w/2,maxX:x+w/2,minY:0,maxY:25,minZ:z-d/2,maxZ:z+d/2});
  });

  // Street lamps
  [[18,0],[-18,0],[0,18],[0,-18],[22,22],[-22,22],[22,-22],[-22,-22]].forEach(([px,pz])=>{
    const pole = new THREE.Mesh(
      new THREE.CylinderGeometry(.16,.16,8,6),
      new THREE.MeshStandardMaterial({color:0x223344, metalness:.75, roughness:.3})
    );
    pole.position.set(px,4,pz); scene.add(pole);
    const globe = new THREE.Mesh(
      new THREE.SphereGeometry(.35,8,6),
      new THREE.MeshBasicMaterial({color:0xffeedd})
    );
    globe.position.set(px,8.35,pz); scene.add(globe);
    const lamp = new THREE.PointLight(0xffe8c0, 3.5, 18);
    lamp.position.set(px,8,pz); scene.add(lamp);
  });
}

// ═══════════════════════════════════════════════════════
// GUN — detailed first-person model
// ═══════════════════════════════════════════════════════
function makeGun() {
  gunGroup = new THREE.Group();

  const steel = new THREE.MeshStandardMaterial({color:0x334455, metalness:.88, roughness:.2});
  const dark  = new THREE.MeshStandardMaterial({color:0x1a2230, metalness:.7,  roughness:.5});
  const grip  = new THREE.MeshStandardMaterial({color:0x1c1c1c, roughness:.9,  metalness:.05});

  // Receiver body
  const body = new THREE.Mesh(new THREE.BoxGeometry(.14,.11,.62), steel);
  gunGroup.add(body);

  // Top rail
  const rail = new THREE.Mesh(new THREE.BoxGeometry(.06,.05,.64), dark);
  rail.position.set(0,.08,.0); gunGroup.add(rail);

  // Barrel
  const barG = new THREE.CylinderGeometry(.024,.024,.55,8); barG.rotateX(Math.PI/2);
  const bar = new THREE.Mesh(barG, steel);
  bar.position.set(0,-.005,-.58); gunGroup.add(bar);

  // Barrel end suppressor
  const supG = new THREE.CylinderGeometry(.032,.032,.1,8); supG.rotateX(Math.PI/2);
  const sup = new THREE.Mesh(supG, dark);
  sup.position.set(0,-.005,-.88); gunGroup.add(sup);

  // Grip
  const gr = new THREE.Mesh(new THREE.BoxGeometry(.085,.18,.12), grip);
  gr.position.set(0,-.14,.08); gr.rotation.x=.18; gunGroup.add(gr);

  // Trigger guard
  const tgG = new THREE.TorusGeometry(.04,.012,4,8,Math.PI);
  const tg = new THREE.Mesh(tgG, dark);
  tg.rotation.z=Math.PI; tg.position.set(0,-.095,-.04); gunGroup.add(tg);

  // Magazine
  const mag = new THREE.Mesh(new THREE.BoxGeometry(.07,.2,.05), dark);
  mag.position.set(0,-.2,-.01); gunGroup.add(mag);

  // Stock
  const stk = new THREE.Mesh(new THREE.BoxGeometry(.1,.08,.22), dark);
  stk.position.set(0,-.02,.34); gunGroup.add(stk);

  // Muzzle flash light
  mFlash = new THREE.PointLight(0xffbb44, 0, 5);
  mFlash.position.set(0,0,-.95); gunGroup.add(mFlash);

  // Neon sight dot
  const sdot = new THREE.Mesh(
    new THREE.SphereGeometry(.01,4,4),
    new THREE.MeshBasicMaterial({color:0xff0000})
  );
  sdot.position.set(0,.13,.1); gunGroup.add(sdot);

  gunGroup.position.set(.22,-.17,-.44);
  cam.add(gunGroup); scene.add(cam);
  refreshGunColor();
}

function refreshGunColor() {
  if (!gunGroup) return;
  const c = WEAPONS[S.weapon].col;
  // Find the rail mesh (index 1) and give it weapon color
  if (gunGroup.children[1]) gunGroup.children[1].material.color.setHex(c);
}

// PLAYER MESHES — realistic humanoid

  chest.position.set(0,.85,.12); g.add(chest);

  helm.position.y=1.72; g.add(helm);

  // Visor
  const vis = new THREE.Mesh(new THREE.BoxGeometry(.42,.14,.12),
    new THREE.MeshBasicMaterial({color:col, transparent:true, opacity:.7}));
  vis.position.set(0,1.63,.24); g.add(vis);

  // Visor glow
  const vgl = new THREE.PointLight(col,1.5,2.5);

  // Belt
  const belt = new THREE.Mesh(new THREE.BoxGeometry(.72,.1,.47), darkMat);
  belt.position.y=.18; g.add(belt);

  // Legs
  [-0.2, 0.2].forEach(ox=>{
    const thigh = new THREE.Mesh(new THREE.BoxGeometry(.3,.62,.3), darkMat);
    thigh.position.set(ox,-.22,0); g.add(thigh);
    const shin  = new THREE.Mesh(new THREE.BoxGeometry(.26,.55,.26), darkMat);

function movePMesh(id, data) {
  const m = pMeshes[id]; if (!m) return;
  if (!data.alive) { m.visible=false; return; }
  m.visible=true;
  m.userData.tx = data.x;
  m.userData.ty = (data.y||1.8)-1;
  m.userData.tz = data.z;
  m.userData.tyaw = data.yaw||0;
  // Detect movement for leg animation
  if (m.userData.lastX !== undefined) {
    const moved = Math.hypot(data.x-m.userData.lastX, data.z-m.userData.lastZ);
    m.userData.moving = moved > 0.01;
  }
  m.userData.lastX = data.x; m.userData.lastZ = data.z;
}

// ═══════════════════════════════════════════════════════
// BULLETS — proper physics & impact
// ═══════════════════════════════════════════════════════
function fire() {
  if (!S.alive || reloading) return;
  const w=WEAPONS[S.weapon], wi=S.weapon;
  if (S.ammo[wi]<=0) { doReload(); return; }
  const now=Date.now(); if(now-lastFire<w.fr) return;
  lastFire=now; S.ammo[wi]--;

  if (mFlash) { mFlash.intensity=9; mTimer=.075; }

  // Recoil
  trP -= w.spread*1.8; trY += (Math.random()-.5)*w.spread*.9;

  // Gun kick animation
  if (gunGroup) {
    gunGroup.position.z += .04;
    gunGroup.rotation.x -= .025;
  }

  const pellets = w.pellets || 1;
  for (let p=0; p<pellets; p++) {
    const sp = w.spread;
    const dir = new THREE.Vector3(0,0,-1);
    dir.applyEuler(new THREE.Euler(
      S.pitch + (Math.random()-.5)*sp*(adsActive?.3:1),
      S.yaw   + (Math.random()-.5)*sp*(adsActive?.3:1),
      0, 'YXZ'
    ));

    const bx=S.x+dir.x*.6, by=S.y+.08+dir.y*.6, bz=S.z+dir.z*.6;
    const bid = localId+'_'+now+'_'+p+'_'+Math.random().toString(36).slice(2,5);
    const bd = {
      owner:localId, ownerName:localName,
      x:bx, y:by, z:bz,
      dx:dir.x, dy:dir.y, dz:dir.z,
      spd: 70 + w.range*.6,
      dmg:w.dmg, wp:w.name, range:w.range,
      expl:w.explosive||false
    };
    spawnLocalBullet(bid, bd);
    netSend({type:'bullet', bid, b:bd});
    checkHits(bd);
  }
  updateHUD();
}

function spawnLocalBullet(id, d) {
  // Tracer line mesh
  const len = 1.6;
  const geo = new THREE.CylinderGeometry(.016,.016,len,4);
  geo.rotateX(Math.PI/2);
  const mat = new THREE.MeshBasicMaterial({color:0xffff66, transparent:true, opacity:.85});
  const m = new THREE.Mesh(geo, mat);
  m.position.set(d.x, d.y, d.z);
  const dir3 = new THREE.Vector3(d.dx,d.dy,d.dz).normalize();
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), dir3);
  scene.add(m);

  // Glow trail
  const gl = new THREE.PointLight(0xffcc00, 2.5, 5);
  m.add(gl);

  bullets[id] = {...d, mesh:m, life:0, local:true, maxLife:d.range/((70+d.range*.6)*.8)};
  bulletMeshes[id] = m;
}

function spawnNetBullet(id, d) {
  const geo = new THREE.SphereGeometry(.05,4,4);
  const m = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color:0xff8844}));
  m.position.set(d.x, d.y, d.z);
  scene.add(m);
  bullets[id] = {...d, mesh:m, life:0, maxLife:d.range/((70+d.range*.6)*.8)};
  bulletMeshes[id] = m;
}

function updateBullets(dt) {
  for (const id in bullets) {
    const b = bullets[id]; if (!b.mesh) continue;
    b.life += dt;
    const spd = b.spd || 70;
    b.x+=b.dx*spd*dt; b.y+=b.dy*spd*dt; b.z+=b.dz*spd*dt;
    b.mesh.position.set(b.x, b.y, b.z);
    // Fade tracer over life
    if (b.mesh.material) b.mesh.material.opacity = Math.max(0, .85 - b.life*1.2);

    if (b.life > b.maxLife || b.y < -5) { rmBullet(id); continue; }
    if (b.local) {
      // Wall collision raycasting
      let hit=false, hitNx=0, hitNy=0, hitNz=0;
      for (const c of colliders) {
        if (b.x>c.minX&&b.x<c.maxX&&b.y>c.minY&&b.y<c.maxY&&b.z>c.minZ&&b.z<c.maxZ) {
          hit=true;
          // Compute approximate normal
          const dxL=Math.abs(b.x-c.minX), dxR=Math.abs(b.x-c.maxX);
          const dzF=Math.abs(b.z-c.minZ), dzB=Math.abs(b.z-c.maxZ);
          const dyT=Math.abs(b.y-c.maxY);
          const mn=Math.min(dxL,dxR,dzF,dzB,dyT);
          if(mn===dxL) hitNx=-1; else if(mn===dxR) hitNx=1;
          else if(mn===dzF) hitNz=-1; else if(mn===dzB) hitNz=1;
          else hitNy=1;
          break;
        }
      }
      if (hit) {
        spawnImpact(b.x,b.y,b.z, hitNx,hitNy,hitNz, b.expl);
        netSend({type:'impact', px:b.x, py:b.y, pz:b.z, nx:hitNx, ny:hitNy, nz:hitNz});
        if (b.expl) doExplosion(b.x,b.y,b.z);
        rmBullet(id);
      }
    }
  }
}

function rmBullet(id) {
  if (bulletMeshes[id]) scene.remove(bulletMeshes[id]);
  delete bulletMeshes[id]; delete bullets[id];
}

// ═══════════════════════════════════════════════════════
// IMPACT SYSTEM — bullet decals + sparks
// ═══════════════════════════════════════════════════════
function spawnImpact(x, y, z, nx, ny, nz, explosive) {
  // Sparks burst
  const count = explosive ? 30 : 8;
  for (let i=0; i<count; i++) {
    const geo = new THREE.SphereGeometry(.03+(Math.random()*.04), 3,3);
    const mat = new THREE.MeshBasicMaterial({color: explosive?0xff6600:0xffcc00});
    const p = new THREE.Mesh(geo, mat);
    p.position.set(x,y,z); scene.add(p);
    const spd = explosive ? 8+Math.random()*12 : 3+Math.random()*5;
    const vx=(Math.random()-.5)*spd+(nx*spd*.5);
    const vy=(Math.random()*.5+.3)*spd+(ny*spd*.5);
    const vz=(Math.random()-.5)*spd+(nz*spd*.5);
    particles.push({mesh:p, vx, vy, vz, life:0, max:explosive?.8:.35, color:explosive?0xff6600:0xffcc00});
  }

  // Smoke puff for explosive
  if (explosive) {
    for(let i=0;i<6;i++){
      const geo=new THREE.SphereGeometry(.4+Math.random()*.6,5,5);
      const mat=new THREE.MeshBasicMaterial({color:0x333333,transparent:true,opacity:.6});
      const p=new THREE.Mesh(geo,mat);
      p.position.set(x+(Math.random()-.5),y+Math.random(),z+(Math.random()-.5));
      scene.add(p);
      particles.push({mesh:p,vx:(Math.random()-.5)*.5,vy:.8+Math.random()*.5,vz:(Math.random()-.5)*.5,life:0,max:1.5,fade:true});
    }
  }

  // Wall scorch decal
  spawnDecal(x,y,z,nx,ny,nz);

  // Flash light
  const fl = new THREE.PointLight(explosive?0xff6600:0xffcc44, explosive?12:5, explosive?18:6);
  fl.position.set(x,y,z); scene.add(fl);
  const flRef = {light:fl, life:0, max:.12};
  particles.push({isLight:true, ...flRef, mesh:{position:new THREE.Vector3(x,y,z)}});
}

function spawnDecal(x, y, z, nx, ny, nz) {
  // Circular bullet hole / scorch mark
  const geo = new THREE.PlaneGeometry(.4,.4);
  const mat = new THREE.MeshBasicMaterial({color:0x111111, transparent:true, opacity:.85, depthWrite:false});
  const d = new THREE.Mesh(geo, mat);
  d.position.set(x+nx*.02, y+ny*.02, z+nz*.02);
  // Align to surface normal
  if (Math.abs(ny)>.8) { d.rotation.x=-Math.PI/2; }
  else if (Math.abs(nx)>.8) { d.rotation.y=Math.sign(nx)*Math.PI/2; }
  else { d.rotation.y=Math.atan2(nx,nz); }
  scene.add(d);
  decals.push({mesh:d, life:0, max:12});
}

function doExplosion(x,y,z) {
  // Screen shake
  camShakeAmt = .4; camShakeT = .35;
  // Damage local player if near
  const dist = Math.hypot(x-S.x, y-S.y, z-S.z);
  if (dist < 8) {
    const dmg = Math.floor(150 * (1 - dist/8));
    if (dmg>0) takeDmg(dmg, '???','ROCKET', {x,y,z});
  }
}

// Camera shake state
let camShakeAmt=0, camShakeT=0;

// ═══════════════════════════════════════════════════════
// HIT DETECTION
// ═══════════════════════════════════════════════════════
function checkHits(bd) {
  const origin = new THREE.Vector3(bd.x, bd.y, bd.z);
  const dir3   = new THREE.Vector3(bd.dx, bd.dy, bd.dz);
  const ray    = new THREE.Raycaster(origin, dir3, 0, bd.range);
  let closest=Infinity, hitId=null;

  for (const id in pMeshes) {
    if (id===localId || !players[id] || !players[id].alive) continue;
    const mesh=pMeshes[id];
    const dist=origin.distanceTo(mesh.position);
    if (dist<50 && dist<closest) {
      const box=new THREE.Box3().setFromObject(mesh);
      box.min.subScalar(.15); box.max.addScalar(.15);
      if (ray.ray.intersectsBox(box)) { closest=dist; hitId=id; }
    }
  }
  if (hitId) {
    flashHitMarker();
    const t=players[hitId];
    const fatal=t&&((t.health||100)-bd.dmg<=0);
    // Blood impact particles at hit location
    spawnBloodImpact(pMeshes[hitId].position.x, pMeshes[hitId].position.y+1, pMeshes[hitId].position.z);
    netSend({type:'hit', h:{victim:hitId, shooter:localId, sName:localName, dmg:bd.dmg, wp:bd.wp, fatal,
      pos:{x:pMeshes[hitId].position.x,y:pMeshes[hitId].position.y+1,z:pMeshes[hitId].position.z}}});
    if (fatal) giveKill(t?t.name:'PLAYER', bd.wp);
  }
}

function spawnBloodImpact(x,y,z){
  for(let i=0;i<10;i++){
    const geo=new THREE.SphereGeometry(.04+Math.random()*.05,3,3);
    const mat=new THREE.MeshBasicMaterial({color:0xcc0000});
    const p=new THREE.Mesh(geo,mat); p.position.set(x,y,z); scene.add(p);
    particles.push({mesh:p,vx:(Math.random()-.5)*4,vy:1+Math.random()*3,vz:(Math.random()-.5)*4,life:0,max:.5});
  }
}

// DAMAGE / DEATH
// ═══════════════════════════════════════════════════════
function takeDmg(dmg, from, wp, pos) {
  if (!S.alive) return;
  S.health = Math.max(0, S.health-dmg);
  updateHUD();
  showDmgFlash();
  camShakeAmt=.15; camShakeT=.18;
  // Blood overlay
  const bl=document.getElementById('BLOOD');
  bl.classList.add('on'); setTimeout(()=>bl.classList.remove('on'), 160);
  if (S.health<=0) doDie(from, wp);
}

function doDie(killer, wp) {
  S.alive=false; S.deaths++;
  addKF(killer, localName, wp);
  netSend({type:'sync', id:localId, s:{...S}});
  document.getElementById('DEATH').classList.add('show');
  let cd=4;
  document.getElementById('DT').textContent='REAPARECIENDO EN '+cd+'...';
  const ti=setInterval(()=>{
    cd--; if(cd<=0){clearInterval(ti);doRespawn();}
    else document.getElementById('DT').textContent='REAPARECIENDO EN '+cd+'...';
  },1000);
}

function doRespawn() {
  doSpawn(); netSend({type:'sync',id:localId,s:{...S}});
  document.getElementById('DEATH').classList.remove('show');
  updateHUD(); notify('¡REAPARECIDO!');
}

function giveKill(victim, wp) {
  S.kills++; S.score+=100;
  if (gameMode==='gungame') {
    S.ggProg++;
    if (S.ggProg<GG_ORDER.length) { switchWp(GG_ORDER[S.ggProg]); notify('ARMA UP! '+WEAPONS[S.weapon].name); }
    else notify('🏆 VICTORIA!');
  }
  addKF(localName, victim, wp);
  if (S.kills%5===0) notify('🔥 '+S.kills+' KILLS!');
  else notify('¡ELIMINADO!');
  updateHUD();
}

// WEAPON
// ═══════════════════════════════════════════════════════
function doReload() {
  if (reloading) return;
  const w=WEAPONS[S.weapon], wi=S.weapon;
  if (S.ammo[wi]>=w.ammo || S.reserve[wi]<=0) return;
  reloading=true;
  document.getElementById('WN').textContent='RECARGANDO...';
  // Reload animation
  if (gunGroup) { gunGroup.rotation.z = .3; setTimeout(()=>{ if(gunGroup) gunGroup.rotation.z=0; }, w.reloadT*.6); }
  reloadTO=setTimeout(()=>{
    const need=w.ammo-S.ammo[wi], take=Math.min(need,S.reserve[wi]);
    S.ammo[wi]+=take; S.reserve[wi]-=take; reloading=false; updateHUD();
  }, w.reloadT);
}

function switchWp(idx) {
  if (reloading) { clearTimeout(reloadTO); reloading=false; }
  S.weapon = Math.max(0,Math.min(idx,WEAPONS.length-1));
  refreshGunColor(); buildWpUI(); updateHUD();
  // Switch animation
  if (gunGroup) { gunGroup.rotation.y=.6; setTimeout(()=>{ if(gunGroup) gunGroup.rotation.y=0; },200); }
}

// ═══════════════════════════════════════════════════════
// PHYSICS — smooth character movement
// ═══════════════════════════════════════════════════════
function updatePlayer(dt) {
  if (!S.alive) return;

  // Look
  const sens = isMobile ? (adsActive?.003:.0048) : (adsActive?.001:.002);
  S.yaw   -= mDx*sens;
  S.pitch -= mDy*sens;
  S.pitch = Math.max(-Math.PI/2.05, Math.min(Math.PI/2.05, S.pitch));
  mDx=0; mDy=0;

  // === FIXED JOYSTICK: jDx/jDz are WORLD-SPACE (not camera-relative) ===
  // jDx = strafe left/right (-1..1), jDz = forward/back (-1..1)
  // We apply them directly in world space so joystick UP always = world forward
  let moveX=0, moveZ=0;

  // Keyboard: camera-relative
  if (K.w||K.s||K.a||K.d) {
    const sin=Math.sin(S.yaw), cos=Math.cos(S.yaw);
    if (K.w) { moveX-=sin; moveZ-=cos; }
    if (K.s) { moveX+=sin; moveZ+=cos; }
    if (K.a) { moveX-=cos; moveZ+=sin; }
    if (K.d) { moveX+=cos; moveZ-=sin; }
  }

  // TOUCH joystick: jDz=-1 = forward (into screen = -Z), jDx= right/left strafe
  // World-space: joystick forward = -Z world direction (absolute, independent of yaw)
  moveX += jDx;   // left/right in world space
  moveZ += jDz;   // forward/back in world space

  const len = Math.hypot(moveX, moveZ);
  if (len>1) { moveX/=len; moveZ/=len; }

  const spd = (adsActive?5:8) * (S.sliding?0:1);

  // Smooth velocity
  const acc = S.onGround ? 18 : 7;
  S.velX += (moveX*spd - S.velX) * acc*dt;
  S.velZ += (moveZ*spd - S.velZ) * acc*dt;

  // Slide
  if (K.shift && S.onGround && len>.1 && !S.sliding) {
    S.sliding=true; S.sVx=S.velX*1.7; S.sVz=S.velZ*1.7;
    setTimeout(()=>{ S.sliding=false; }, 520);
  }

  if (S.sliding) { S.sVx*=.91; S.sVz*=.91; S.x+=S.sVx*dt; S.z+=S.sVz*dt; }
  else { S.x+=S.velX*dt; S.z+=S.velZ*dt; }

  // Gravity
  S.vy -= 21*dt;
  if ((K.space||tJump) && S.onGround) { S.vy=9; S.onGround=false; tJump=false; }
  S.y += S.vy*dt;

  if (S.y<=1.8) { S.y=1.8; S.vy=0; S.onGround=true; }

  // AABB colliders
  const PR=.44, PH=1.9;
  for (const c of colliders) {
    const cx=(c.minX+c.maxX)/2, cz=(c.minZ+c.maxZ)/2;
    const hw=(c.maxX-c.minX)/2+PR, hd=(c.maxZ-c.minZ)/2+PR;
    const dx=S.x-cx, dz=S.z-cz;
    if (Math.abs(dx)<hw&&Math.abs(dz)<hd&&S.y<c.maxY+PR&&S.y+PH>c.minY) {
      const ovX=hw-Math.abs(dx), ovZ=hd-Math.abs(dz);
      if (ovX<ovZ) { S.x+=Math.sign(dx)*ovX; S.velX=0; }
      else { S.z+=Math.sign(dz)*ovZ; S.velZ=0; }
      // Stand on top
      if (S.y<c.maxY&&S.y+PH>c.maxY&&S.vy<0&&Math.abs(dx)<(c.maxX-c.minX)/2+PR*.5&&Math.abs(dz)<(c.maxZ-c.minZ)/2+PR*.5) {
        S.y=c.maxY; S.vy=0; S.onGround=true;
      }
    }
  }

  const B=MAP_SZ-1;
  S.x=Math.max(-B,Math.min(B,S.x));
  S.z=Math.max(-B,Math.min(B,S.z));

  // Camera
  cam.position.set(S.x, S.y, S.z);
  cam.rotation.order='YXZ';

  // Camera shake
  let shX=0, shY=0;
  if (camShakeT>0) {
    camShakeT-=dt; if(camShakeT<0)camShakeT=0;
    const sr=camShakeT/(.35||.18)*camShakeAmt;
    shX=(Math.random()-.5)*sr*.04; shY=(Math.random()-.5)*sr*.04;
  }

  cam.rotation.y = S.yaw + rY + shX;
  cam.rotation.x = S.pitch + Math.min(rP,0) + shY;

  // Head bob
  const moving = len>.05;
  if (moving && S.onGround) {
    bobT += dt*(adsActive?5:8);
    cam.position.y += Math.sin(bobT)*(adsActive?.025:.052);
    if (gunGroup) {
      gunGroup.position.y = -.17 + Math.sin(bobT)*(adsActive?.008:.017);
      gunGroup.rotation.z = Math.sin(bobT*.5)*(adsActive?.006:.016);
    }
  } else {
    bobT=0;
    // Breathing idle motion
    const breathe = Math.sin(Date.now()*.0008)*.004;
    if (gunGroup) gunGroup.position.y += (-.17+breathe - gunGroup.position.y)*.08;
  }

  // ADS: push gun closer
  if (gunGroup) {
    const tgz = adsActive ? -.28 : -.44;
    const tgx = adsActive ? -.0 : .22;
    gunGroup.position.z += (tgz - gunGroup.position.z)*.14;
    gunGroup.position.x += (tgx - gunGroup.position.x)*.14;
  }

  // Touch auto fire
  if (WEAPONS[S.weapon].auto && tFire) fire();
}

// ═══════════════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════════════
function updateParticles(dt) {
  for (let i=particles.length-1; i>=0; i--) {
    const p=particles[i];
    if (p.isLight) {
      p.life+=dt;
      if (p.life>=p.max) { scene.remove(p.light); particles.splice(i,1); continue; }
      p.light.intensity *= .88;
      continue;
    }
    p.life+=dt;
    p.vy=(p.vy||0)-9*dt;
    p.mesh.position.x+=(p.vx||0)*dt;
    p.mesh.position.y+=p.vy*dt;
    p.mesh.position.z+=(p.vz||0)*dt;
    const t=p.life/p.max;
    if (p.fade) { p.mesh.material.opacity=Math.max(0,(1-t)*.6); }
    else { p.mesh.material.opacity=Math.max(0,1-t); }
    p.mesh.material.transparent=true;
    if (p.life>=p.max) { scene.remove(p.mesh); particles.splice(i,1); }
  }
  // Clean decals
  for (let i=decals.length-1; i>=0; i--) {
    const d=decals[i]; d.life+=dt;
    if (d.life>d.max) { scene.remove(d.mesh); decals.splice(i,1); }
    else if (d.life>d.max-2) d.mesh.material.opacity = (d.max-d.life)/2*.85;
  }
}

// ═══════════════════════════════════════════════════════
// RECOIL
// ═══════════════════════════════════════════════════════
function updateRecoil(dt) {
  rP += (trP-rP)*16*dt; rY += (trY-rY)*16*dt;
  trP -= trP*6*dt; trY -= trY*6*dt;
  // Gun return to rest
  if (gunGroup) {
    gunGroup.position.z += (-.44 - gunGroup.position.z)*10*dt;
    gunGroup.rotation.x += (0 - gunGroup.rotation.x)*10*dt;
  }
}

// ═══════════════════════════════════════════════════════
// REMOTE PLAYER INTERPOLATION — smooth
// ═══════════════════════════════════════════════════════
function interpRemotes(dt) {
  for (const id in pMeshes) {
    if (id===localId) continue;
    const m=pMeshes[id]; if(!m) continue;
    if (m.userData.tx!==undefined) {
      const alpha=Math.min(1,16*dt);
      m.position.x+=(m.userData.tx-m.position.x)*alpha;
      m.position.y+=(m.userData.ty-m.position.y)*alpha;
      m.position.z+=(m.userData.tz-m.position.z)*alpha;
      let dy=m.userData.tyaw-m.rotation.y;
      while(dy>Math.PI)dy-=Math.PI*2; while(dy<-Math.PI)dy+=Math.PI*2;
      m.rotation.y+=dy*alpha;
    }
    // Leg animation for moving remote players
    if (m.userData.moving) {
      m.userData.legT=(m.userData.legT||0)+dt*7;
      const lt=m.userData.legT;
      // Animate leg children (rough approximation of index positions)
      m.children.forEach((ch,idx)=>{
        if(ch.position.y<-.2&&ch.position.y>-.4){
          ch.rotation.x=Math.sin(lt+(idx<12?0:Math.PI))*.35;
        }
      });
    }
  }
}

// ═══════════════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════════════
function updateHUD() {
  const wi=S.weapon, w=WEAPONS[wi];
  document.getElementById('HV').textContent=S.health;
  document.getElementById('HPF').style.width=S.health+'%';
  document.getElementById('HV').className='hstat-val'+(S.health<=30?' low':'');

  document.getElementById('HSC').textContent=S.score;

function buildWpUI() {
  const el=document.getElementById('WW'); el.innerHTML='';
  WEAPONS.forEach((w,i)=>{
    const s=document.createElement('div');
    s.className='wpslot'+(i===S.weapon?' cur':'');
    s.textContent=(i+1)+' '+w.name; el.appendChild(s);
  });
}

function addKF(killer,victim,wp) {
  const feed=document.getElementById('KF');
  const e=document.createElement('div'); e.className='kentry';
  e.innerHTML=`<span class="kn">${killer}</span> <span class="kw">[${wp}]</span> <span class="kv">${victim}</span>`;
  feed.appendChild(e);
  setTimeout(()=>e.remove(),3600);
  // Keep max 6
  while(feed.children.length>6) feed.removeChild(feed.firstChild);
}

function flashHitMarker(){
  const h=document.getElementById('HITM'); h.classList.add('on');
  setTimeout(()=>h.classList.remove('on'),90);
}
function showDmgFlash(){
  const d=document.getElementById('DMGF'); d.classList.add('on');
  setTimeout(()=>d.classList.remove('on'),100);
}
function notify(msg){
  const n=document.getElementById('HN'); n.textContent=msg;
  n.classList.remove('pop'); void n.offsetWidth; n.classList.add('pop');
  setTimeout(()=>n.classList.remove('pop'),2100);
}

function updateLB() {
  const rows=[];
  for(const id in players) rows.push({id,name:(players[id].name||'?').slice(0,10),k:players[id].kills||0,me:false});
  const mi=rows.findIndex(r=>r.id===localId);
  if(mi<0) rows.push({id:localId,name:localName.slice(0,10),k:S.kills,me:true});
  else{rows[mi].k=S.kills;rows[mi].me=true;}
  rows.sort((a,b)=>b.k-a.k);
  document.getElementById('LBL').innerHTML=rows.slice(0,6).map((r,i)=>
    `<div class="lb-row${r.me?' me':''}"><span>${i+1} ${r.name}</span><span class="lk">${r.k}</span></div>`
  ).join('');
}

function updateMinimap() {
  const cv=document.getElementById('MMC'); if(!cv) return;
  const ctx=cv.getContext('2d'); ctx.clearRect(0,0,105,105);
  const sc=1.05, off=52;
  // Draw map blocks
  ctx.fillStyle='rgba(0,245,255,0.15)';
  MAP.forEach(([bx,bz,w,d])=>{
    ctx.fillRect((bx-S.x)*sc+off-w*sc/2,(bz-S.z)*sc+off-d*sc/2,w*sc,d*sc);
  });
  // Draw players
  for (const id in pMeshes) {
    const p=id===localId?S:players[id]; if(!p||!p.alive) continue;
    const tx=(p.x-S.x)*sc+off, ty=(p.z-S.z)*sc+off;
    ctx.beginPath(); ctx.arc(tx,ty,id===localId?3.5:2.5,0,Math.PI*2);
    ctx.fillStyle=id===localId?'#00f5ff':'#ff0066'; ctx.fill();
    if(id===localId){
      ctx.beginPath(); ctx.moveTo(tx,ty);
      ctx.lineTo(tx+Math.sin(S.yaw+.32)*10, ty-Math.cos(S.yaw+.32)*10);
      ctx.lineTo(tx+Math.sin(S.yaw-.32)*10, ty-Math.cos(S.yaw-.32)*10);
      ctx.fillStyle='rgba(0,245,255,0.4)'; ctx.fill();
    }
  }
}

// ═══════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════
function setupKeys() {
  window.addEventListener('keydown', e=>{
    switch(e.code){
      case 'KeyW':K.w=true;break; case 'KeyS':K.s=true;break;
      case 'KeyA':K.a=true;break; case 'KeyD':K.d=true;break;
      case 'Space':K.space=true;e.preventDefault();break;
      case 'ShiftLeft':case 'ShiftRight':K.shift=true;break;
      case 'ControlLeft':case 'ControlRight':K.ctrl=true;break;
      case 'KeyR':if(!reloading)doReload();break;
      case 'Digit1':switchWp(0);break; case 'Digit2':switchWp(1);break;
      case 'Digit3':switchWp(2);break; case 'Digit4':switchWp(3);break;
      case 'Digit5':switchWp(4);break; case 'Digit6':switchWp(5);break;
      case 'Digit7':switchWp(6);break;
      case 'Escape':togglePause();break;
    }
  });
  window.addEventListener('keyup', e=>{
    switch(e.code){
      case 'KeyW':K.w=false;break; case 'KeyS':K.s=false;break;
      case 'KeyA':K.a=false;break; case 'KeyD':K.d=false;break;
      case 'Space':K.space=false;break;
      case 'ShiftLeft':case 'ShiftRight':K.shift=false;break;
      case 'ControlLeft':case 'ControlRight':K.ctrl=false;break;
    }
  });
  window.addEventListener('mousedown', e=>{
    if(e.button===0){mHeld=true;if(pLocked)fire();}
    if(e.button===2){adsActive=true;}
  });
  window.addEventListener('mouseup', e=>{
    if(e.button===0)mHeld=false;
    if(e.button===2)adsActive=false;
  });
  window.addEventListener('contextmenu',e=>e.preventDefault());
  window.addEventListener('mousemove', e=>{if(!pLocked)return;mDx+=e.movementX||0;mDy+=e.movementY||0;});
  window.addEventListener('wheel', e=>{if(!pLocked)return;switchWp((S.weapon+(e.deltaY>0?1:-1)+WEAPONS.length)%WEAPONS.length);});
}

function setupPointerLock() {
  const ov=document.getElementById('PLO'), cv=document.getElementById('CV');
  ov.addEventListener('click',()=>cv.requestPointerLock());
  document.addEventListener('pointerlockchange',()=>{
    pLocked=!!document.pointerLockElement;
    ov.classList.toggle('show',!pLocked);
  });
}

// ═══════════════════════════════════════════════════════
// TOUCH — FIXED JOYSTICK
// ═══════════════════════════════════════════════════════
function setupTouch() {
  const ja=document.getElementById('JA'), jk=document.getElementById('JK');
  const R=62; // joystick radius

  ja.addEventListener('touchstart', e=>{
    e.preventDefault();
    const t=e.touches[0], rect=ja.getBoundingClientRect();
    jOx=rect.left+rect.width/2; jOy=rect.top+rect.height/2;
    jActive=true;
  },{passive:false});

  ja.addEventListener('touchmove', e=>{
    e.preventDefault(); if(!jActive) return;
    const t=e.touches[0];
    const dx=t.clientX-jOx, dy=t.clientY-jOy;
    const dist=Math.min(Math.hypot(dx,dy),R);
    const ang=Math.atan2(dy,dx);
    const nx=Math.cos(ang)*dist, ny=Math.sin(ang)*dist;
    jk.style.transform=`translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;

    // WORLD-SPACE: Y-axis of screen = Z-axis of world (forward/back)
    // X-axis of screen = X-axis of world (left/right)
    // So: up on joystick (negative dy) = move forward (negative Z = -jDz)
    jDx = nx/R;    // screen right = world right (+X)
    jDz = ny/R;    // screen down = world forward (+Z)
    // NOTE: In Three.js, -Z is "into screen" = forward
    // So when joystick points up (ny negative), jDz should be negative = forward
  },{passive:false});

  const resetJoy=()=>{jActive=false;jDx=0;jDz=0;jk.style.transform='translate(-50%,-50%)';};
  ja.addEventListener('touchend',resetJoy);
  ja.addEventListener('touchcancel',resetJoy);

  // Look zone
  const la=document.getElementById('LA');
  la.addEventListener('touchstart',e=>{
    const t=e.changedTouches[0]; ltId=t.identifier; ltLX=t.clientX; ltLY=t.clientY;
  });
  la.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(let i=0;i<e.changedTouches.length;i++){
      const t=e.changedTouches[i];
      if(t.identifier===ltId){
        mDx+=(t.clientX-ltLX)*1.65; mDy+=(t.clientY-ltLY)*1.65;
        ltLX=t.clientX; ltLY=t.clientY;
      }
    }
  },{passive:false});
  la.addEventListener('touchend',e=>{for(let i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===ltId)ltId=null;});

  // Buttons
  function tbtn(id,onStart,onEnd){
    const b=document.getElementById(id);
    b.addEventListener('touchstart',e=>{e.preventDefault();onStart();b.classList.add('on');},{passive:false});
    b.addEventListener('touchend',e=>{e.preventDefault();onEnd();b.classList.remove('on');},{passive:false});
    b.addEventListener('touchcancel',()=>{onEnd();b.classList.remove('on');});
  }
  tbtn('tb-fire', ()=>{tFire=true;}, ()=>{tFire=false;});
  tbtn('tb-jump', ()=>{tJump=true;K.space=true;}, ()=>{K.space=false;tJump=false;});
  tbtn('tb-reload',()=>{if(!reloading)doReload();},()=>{});
  tbtn('tb-slide', ()=>{K.shift=true;}, ()=>{K.shift=false;});
  tbtn('tb-swap',  ()=>{switchWp((S.weapon+1)%WEAPONS.length);},()=>{});
  tbtn('tb-aim',   ()=>{adsActive=true;}, ()=>{adsActive=false;});

  // Also fire on look zone tap (single tap)
  la.addEventListener('touchstart',e=>{
    if(!WEAPONS[S.weapon].auto) fire();
  });
}

// ═══════════════════════════════════════════════════════
// NETWORK SYNC
// ═══════════════════════════════════════════════════════
let lastSync=0;
function doSync() {
  const now=Date.now(); if(now-lastSync<50) return; lastSync=now;
  if(!players[localId]) players[localId]={...S};
  Object.assign(players[localId],S);
  netSend({type:'sync', id:localId, s:{...S}});
}

// ═══════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════
let frameCount=0, lastFPSTime=0;
function gameLoop() {
  if (!gameStarted) return;
  requestAnimationFrame(gameLoop);
  const dt=Math.min(clock.getDelta(), .042);

  updatePlayer(dt);
  updateBullets(dt);
  updateParticles(dt);
  interpRemotes(dt);
  updateRecoil(dt);

  // Muzzle flash decay
  if (mTimer>0) { mTimer-=dt; if(mTimer<=0&&mFlash) mFlash.intensity=0; }

  // Auto fire desktop
  if (WEAPONS[S.weapon].auto&&mHeld&&pLocked&&S.alive) fire();

  // Neon light pulse
  const t=performance.now()*.001;
  scene.children.forEach(c=>{
    if(c.isPointLight&&c.userData.neon){c.intensity=c.userData.base+Math.sin(t*2+c.userData.phase)*.4;}
  });

  doSync();
  updateLB();
  updateMinimap();
  renderer.render(scene, cam);
}

// ═══════════════════════════════════════════════════════
// PAUSE
// ═══════════════════════════════════════════════════════
function togglePause(){
  const pm=document.getElementById('PAUSE');
  if(pm.classList.contains('show')) doResume();
  else{pm.classList.add('show');if(document.pointerLockElement)document.exitPointerLock();}
}
window.doResume=function(){document.getElementById('PAUSE').classList.remove('show');};
window.doLeave=function(){gameStarted=false;netSend({type:'leave',id:localId});location.reload();};

// BOOT

init().then(()=>{
  document.getElementById('PB').addEventListener('click', async()=>{
    document.getElementById('PB').disabled=true;
    setSL('CONECTANDO...');
    await startGame();
  });
});
